<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation System</title>
    <style>
        body {
                    background: url("{{ url_for('static', filename='images/farm.jpg') }}");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
height: 100vh;
margin: 0;
            font-family: Arial;
            text-align: center;
        }
        .container {
    background: rgba(255, 255, 255, 0.95);
    padding: 35px;
    width: 420px;
    border-radius: 15px;
    box-shadow: 0px 8px 25px rgba(0,0,0,0.3);

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
        input {
            margin: 5px;
            padding: 8px;
            width: 90%;
        }
        button {
            padding: 10px;
            background: green;
            color: white;
            border: none;
            width: 95%;
        }
        result-image {
    margin-top: 20px;
    text-align: center;
}

.result-image img {
    width: 500px;
    border-radius: 15px;
    box-shadow: 0px 8px 25px rgba(0,0,0,0.5);
}
    </style>
</head>
<body>

<div class="container">
    <h2>Intelligent Crop Recommendation</h2>
    <form action="/predict" method="post">
        <input type="text" name="N" placeholder="Nitrogen" required>
        <input type="text" name="P" placeholder="Phosphorus" required>
        <input type="text" name="K" placeholder="Potassium" required>
        <input type="text" name="temperature" placeholder="Temperature" required>
        <input type="text" name="humidity" placeholder="Humidity" required>
        <input type="text" name="ph" placeholder="pH" required>
        <input type="text" name="rainfall" placeholder="Rainfall" required>
        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>
    

{% if image_file %}
<div class="result-image">
    <img src="{{ url_for('static', filename='crops/' + image_file) }}">
</div>
{% endif %}
</div>

</body>
</html>
